# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     453110263532536833       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "Tiny tapeout MAC unit"      # Project title
  author:       "Christopher Kessler"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "MAC unit from A Multiply-and-Accumulate Array for Machine Learning Applications Based on a 3D Nanofabric Flow"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "FULL_A"
  ui[1]: "FULL_B"
  ui[2]: "XOR_1"
  ui[3]: "XOR_2"
  ui[4]: "AND_1"
  ui[5]: "AND_2"
  ui[6]: "D_FLIP"
  ui[7]: "INV"

  # Outputs
  uo[0]: "SUM"
  uo[1]: "CARRY"
  uo[2]: "XOR"
  uo[3]: "NAND"
  uo[4]: "AND"
  uo[5]: Q"
  uo[6]: "Q_B"
  uo[7]: "INV_B"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

